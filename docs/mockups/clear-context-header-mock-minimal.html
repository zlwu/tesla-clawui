<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Minimal Header Mock</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #17181d;
        --surface: #24262d;
        --surface-alt: #202229;
        --text: #ececf1;
        --text-2: #9ea3b3;
        --border: #333743;
        --shadow: rgba(0, 0, 0, 0.34);
        --good: #55c27d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(85, 194, 125, 0.08), transparent 18%),
          linear-gradient(180deg, #1b1c22 0%, #15161a 100%);
        color: var(--text);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .frame {
        width: min(100%, 980px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px 16px 24px;
        display: grid;
        gap: 12px;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title-wrap {
        min-width: 0;
      }

      .title {
        margin: 0;
        font-size: clamp(26px, 3vw, 32px);
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .subtle {
        margin: 3px 0 0;
        color: var(--text-2);
        font-size: 12px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .status-minimal {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(36, 38, 45, 0.92);
        box-shadow: 0 10px 26px var(--shadow);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--good);
        box-shadow: 0 0 0 4px rgba(85, 194, 125, 0.14);
      }

      .icon-button {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(36, 38, 45, 0.92);
        color: var(--text);
        box-shadow: 0 10px 26px var(--shadow);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
      }

      .clear-button {
        color: #efc4c4;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }

      .note {
        width: min(100%, 860px);
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px dashed var(--border);
        color: var(--text-2);
        font-size: 14px;
        line-height: 1.45;
      }

      .message {
        width: min(100%, 860px);
        padding: 18px 18px 20px;
        border-radius: 22px;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 14px;
      }

      .assistant {
        background: var(--surface);
      }

      .user {
        background: var(--surface-alt);
        justify-self: end;
      }

      .avatar {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text-2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }

      .content {
        font-size: 21px;
        line-height: 1.52;
      }

      .composer {
        padding: 14px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: rgba(36, 38, 45, 0.94);
        box-shadow: 0 12px 28px var(--shadow);
        display: grid;
        gap: 10px;
      }

      .composer-input {
        min-height: 88px;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--border);
        color: var(--text-2);
        font-size: 22px;
      }

      .composer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .composer-hint {
        color: var(--text-2);
        font-size: 14px;
      }

      .send {
        width: 58px;
        height: 58px;
        border: none;
        border-radius: 18px;
        background: #f0f1f5;
        color: #191a1f;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <header class="header">
        <div class="title-wrap">
          <h1 class="title">OpenClaw</h1>
          <p class="subtle">极简版：状态只保留一个点状信号</p>
        </div>

        <div class="actions">
          <div class="status-minimal" aria-label="状态正常">
            <span class="status-dot"></span>
          </div>

          <button class="icon-button clear-button" aria-label="清除上下文" title="清除上下文">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4.8 6.2h10.4"></path>
              <path d="M7.3 6.2V5.1c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1v1.1"></path>
              <path d="M6.2 6.2l.6 8.1c0 .9.4 1.6 1.3 1.6h3.8c.9 0 1.3-.7 1.3-1.6l.6-8.1"></path>
              <path d="M8.6 8.7v4.4M11.4 8.7v4.4"></path>
            </svg>
          </button>

          <button class="icon-button" aria-label="切换主题" title="切换主题">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
              <circle cx="10" cy="10" r="3"></circle>
              <path d="M10 4.5V3.5M10 16.5V15.5M4.5 10H3.5M16.5 10H15.5M6.04 6.04L5.33 5.33M14.67 14.67L13.96 13.96M13.96 6.04L14.67 5.33M5.33 14.67L6.04 13.96"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="messages">
        <div class="note">
          这版把右上角压到最轻：一个状态点，一个清除按钮，一个主题按钮。好处是干净；代价是状态语义更弱，离线、错误、回复中需要依赖颜色或交互说明补足。
        </div>

        <article class="message assistant">
          <div class="avatar">OC</div>
          <div class="content">这是更极简的顶栏方案，状态只剩一个信号点。</div>
        </article>

        <article class="message user">
          <div class="avatar">你</div>
          <div class="content">这样更轻，但状态含义会不会不够直观？</div>
        </article>
      </section>

      <section class="composer">
        <div class="composer-input">给 OpenClaw 发消息，Tesla 真机请使用系统语音输入后发送</div>
        <div class="composer-row">
          <div class="composer-hint">右上角只保留 3 个控件，主发送区继续保持纯净</div>
          <button class="send" aria-label="发送">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10 15.2V5.4"></path>
              <path d="M5.9 8.5 10 4.4l4.1 4.1"></path>
            </svg>
          </button>
        </div>
      </section>
    </main>
  </body>
  </html>
